name: smart_package_app
description: Smart Service Package Builder - AI-powered pricing app

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking
  dio: ^5.4.0
  # FIX: Removed 'retrofit' — ApiService uses Dio directly; retrofit was declared
  # but never used (no @RestApi annotations anywhere in the codebase).

  # Local Storage / Offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^13.0.0

  # Auth
  flutter_secure_storage: ^9.0.0
  jwt_decoder: ^2.0.1

  # UI / Animations
  animate_do: ^3.3.4
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  fluttertoast: ^8.2.4
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  # FIX: Removed 'retrofit_generator' — no longer needed without retrofit.
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
